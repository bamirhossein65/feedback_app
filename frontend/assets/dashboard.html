<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت فیدبک‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 antialiased pb-12">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-3">
            <div class="bg-indigo-600 p-2.5 rounded-xl text-white shadow-md shadow-indigo-100">
                <i class="fa-solid fa-chart-line text-lg"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800">میز کار مدیریت سیستم</h1>
                <p class="text-xs text-slate-400">بررسی و پاسخگویی به نظرات کاربران</p>
            </div>
        </div>
        <button onclick="logout()" class="flex items-center gap-2 bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-xl transition font-medium text-sm border border-red-100">
            <i class="fa-solid fa-arrow-right-from-bracket"></i> خروج از پنل
        </button>
    </header>

    <main class="max-w-6xl mx-auto px-4 mt-8">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8">
            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">کل فیدبک‌ها</p>
                    <h3 id="totalCount" class="text-2xl font-bold mt-1 text-slate-800">0</h3>
                </div>
                <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600 text-xl"><i class="fa-solid fa-inbox"></i></div>
            </div>
            
            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">گزارش باگ 🐛</p>
                    <h3 id="bugCount" class="text-2xl font-bold mt-1 text-rose-600">0</h3>
                </div>
                <div class="bg-rose-50 p-3 rounded-xl text-rose-600 text-xl"><i class="fa-solid fa-bug"></i></div>
            </div>

            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">پیشنهاد و انتقاد 💡</p>
                    <h3 id="suggestionCount" class="text-2xl font-bold mt-1 text-amber-600">0</h3>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl text-amber-600 text-xl"><i class="fa-solid fa-lightbulb"></i></div>
            </div>

            <div class="bg-white border border-slate-100 p-5 rounded-2xl shadow-sm flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-400 font-medium">سایر موارد 📨</p>
                    <h3 id="otherCount" class="text-2xl font-bold mt-1 text-teal-600">0</h3>
                </div>
                <div class="bg-teal-50 p-3 rounded-xl text-teal-600 text-xl"><i class="fa-solid fa-envelope-open-text"></i></div>
            </div>
        </div>

        <div class="bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700">لیست آخرین پیام‌های دریافتی از کاربران</h3>
                <button onclick="loadFeedbacks()" class="flex items-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-3 py-1.5 rounded-xl transition text-xs font-semibold border border-indigo-100">
                    <i class="fa-solid fa-rotate animate-duration-500"></i> بروزرسانی لیست
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full border-collapse text-right">
                    <thead>
                        <tr class="bg-slate-100/50 text-slate-500 text-xs font-bold border-b border-slate-100">
                            <th class="p-4 w-12 text-center">ردیف</th>
                            <th class="p-4 w-40">مشخصات کاربر</th>
                            <th class="p-4 w-36">نوع فیدبک</th>
                            <th class="p-4">متن پیام دریافتی</th>
                            <th class="p-4 w-20 text-center">عملیات</th> </tr>
                    </thead>
                    <tbody id="feedbackTableBody" class="divide-y divide-slate-100 text-sm text-slate-700">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

<script>
    function getCategoryBadge(category) {
        if (category === 'bug') {
            return `<span class="inline-flex items-center gap-1 bg-rose-50 text-rose-700 text-xs px-2.5 py-1 rounded-lg border border-rose-100 font-medium"><i class="fa-solid fa-bug text-[10px]"></i> گزارش خطا</span>`;
        } else if (category === 'suggestion') {
            return `<span class="inline-flex items-center gap-1 bg-amber-50 text-amber-700 text-xs px-2.5 py-1 rounded-lg border border-amber-100 font-medium"><i class="fa-solid fa-lightbulb text-[10px]"></i> پیشنهاد و انتقاد</span>`;
        } else if (category === 'other') {
            return `<span class="inline-flex items-center gap-1 bg-teal-50 text-teal-700 text-xs px-2.5 py-1 rounded-lg border border-teal-100 font-medium"><i class="fa-solid fa-envelope text-[10px]"></i> سایر موارد</span>`;
        }
        return `<span class="bg-slate-100 text-slate-600 text-xs px-2.5 py-1 rounded-lg font-medium">عمومی</span>`;
    }

    async function loadFeedbacks() {
        const token = localStorage.getItem('admin_token');
        if (!token) { window.location.href = 'login.html'; return; }

        try {
            const response = await fetch('http://127.0.0.1:8000/api/feedbacks/', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.status === 401) { logout(); return; }

            const feedbacks = await response.json();
            const tableBody = document.getElementById('feedbackTableBody');
            tableBody.innerHTML = '';

            document.getElementById('totalCount').innerText = feedbacks.length;
            let bugs = 0, suggestions = 0, others = 0;

            if (feedbacks.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-slate-400 font-medium">تاکنون هیچ فیدبکی ثبت نشده است. 📨</td></tr>`;
                document.getElementById('bugCount').innerText = 0;
                document.getElementById('suggestionCount').innerText = 0;
                document.getElementById('otherCount').innerText = 0;
                return;
            }

            feedbacks.forEach((fb, index) => {
                if (fb.category === 'bug') bugs++;
                if (fb.category === 'suggestion') suggestions++;
                if (fb.category === 'other') others++;

                const userName = fb.name ? fb.name : 'ناشناس';
                const userEmail = fb.email ? `<span class="block text-[11px] text-slate-400 font-mono text-left">${fb.email}</span>` : '';

                const row = `<tr class="hover:bg-slate-50/80 transition duration-150">
                    <td class="p-4 text-center font-mono text-slate-400">${index + 1}</td>
                    <td class="p-4 font-medium text-slate-800">
                        <div>${userName}</div>
                        ${userEmail}
                    </td>
                    <td class="p-4">${getCategoryBadge(fb.category)}</td>
                    <td class="p-4 text-slate-600 leading-relaxed max-w-xl break-words">${fb.message}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteFeedback(${fb.id})" class="text-rose-600 hover:bg-rose-50 p-2 rounded-xl transition border border-transparent hover:border-rose-100" title="حذف فیدبک">
                            <i class="fa-solid fa-trash-can text-base"></i>
                        </button>
                    </td>
                </tr>`;
                tableBody.innerHTML += row;
            });

            document.getElementById('bugCount').innerText = bugs;
            document.getElementById('suggestionCount').innerText = suggestions;
            document.getElementById('otherCount').innerText = others;

        } catch (error) {
            console.error('خطا در بارگذاری اطلاعات:', error);
        }
    }
    async function deleteFeedback(feedbackId) {
        if (!confirm("آیا از حذف این فیدبک مطمئن هستید؟")) return;

        const token = localStorage.getItem('admin_token');
        if (!token) { window.location.href = 'login.html'; return; }

        try {
            const response = await fetch(`http://127.0.0.1:8000/api/feedbacks/${feedbackId}`, {
                method: 'DELETE',
                headers: { 
                    'Authorization': `Bearer ${token}` 
                }
            });

            if (response.ok) {
                loadFeedbacks();
            } else if (response.status === 401) {
                alert("نشست شما منقضی شده است. لطفا دوباره وارد شوید.");
                logout();
            } else {
                alert("❌ خطایی در حذف فیدبک رخ داد.");
            }
        } catch (error) {
            alert("❌ خطا در اتصال به سرور جهت حذف داده.");
        }
    }

    function logout() {
        localStorage.removeItem('admin_token');
        window.location.href = 'login.html';
    }

    loadFeedbacks();
</script>
</body>
</html>
