<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل مدیریت</title>
    <style>
        * { box-sizing: border-box; font-family: Tahoma, Geneva, sans-serif; }
        body { background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>ورود مدیریت</h2>
    <form id="loginForm">
        <div class="form-group">
            <label>نام کاربری:</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>رمز عبور:</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">ورود به پنل</button>
    </form>
</div>

<script>
    const API_BASE_URL = 'http://127.0.0.1:8000';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        try {
            // fetch request to the backend login endpoint
            const response = await fetch(`${API_BASE_URL}/login/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (response.ok) {
                const data = await response.json();
                // save token in browser
                localStorage.setItem('admin_token', data.access_token);
                
                window.location.href = 'dashboard.html';
            } else {
                alert('❌ نام کاربری یا رمز عبور اشتباه است.');
            }
        } catch (error) {
            alert('اتصال به سرور داکر برقرار نشد! مطمئن شوید با داکر کامپوز پروژه بالا آمده است.');
            console.error(error);
        }
    });
</script>
</body>
</html>
